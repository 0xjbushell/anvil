<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" role="img" aria-labelledby="title desc">
  <title id="title">Anvil agent-ready scaffold</title>
  <desc id="desc">A stylized agent-ready scaffold moving from source files through generated guidance and validation gates.</desc>
  <defs>
    <linearGradient id="bg" x1="64" x2="696" y1="40" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.52" stop-color="#18233f"/>
      <stop offset="1" stop-color="#331b4f"/>
    </linearGradient>
    <linearGradient id="ember" x1="128" x2="640" y1="94" y2="446" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7a1a"/>
      <stop offset="0.48" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#39c5ff"/>
    </linearGradient>
    <linearGradient id="pane" x1="94" x2="666" y1="108" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1f2a44"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="760" height="540" rx="42" fill="url(#bg)"/>
  <path d="M86 420C176 312 220 116 352 132c116 14 150 178 292 80" stroke="url(#ember)" stroke-width="3" stroke-linecap="round" opacity="0.65" filter="url(#glow)"/>
  <path d="M88 134c102 54 164 14 236-22 118-58 240 6 340 78" stroke="#39c5ff" stroke-width="2" stroke-dasharray="8 14" opacity="0.32"/>

  <g filter="url(#shadow)">
    <rect x="98" y="92" width="564" height="356" rx="30" fill="url(#pane)" stroke="rgba(255,255,255,0.14)"/>
    <rect x="98" y="92" width="564" height="54" rx="30" fill="#111827"/>
    <circle cx="132" cy="119" r="7" fill="#ff7a1a"/>
    <circle cx="154" cy="119" r="7" fill="#ffd166"/>
    <circle cx="176" cy="119" r="7" fill="#39c5ff"/>
    <text x="214" y="126" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">anvil forge</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">
    <rect x="132" y="178" width="176" height="64" rx="18" fill="#0f172a" stroke="#39c5ff" stroke-opacity="0.5"/>
    <text x="154" y="204" fill="#39c5ff">source repo</text>
    <text x="154" y="226" fill="#94a3b8">typescript / go / py</text>

    <rect x="452" y="178" width="176" height="64" rx="18" fill="#0f172a" stroke="#ff7a1a" stroke-opacity="0.55"/>
    <text x="474" y="204" fill="#ffd166">AGENTS.md</text>
    <text x="474" y="226" fill="#94a3b8">local agent guidance</text>

    <rect x="132" y="316" width="176" height="64" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text x="154" y="342" fill="#c4b5fd">.anvil.lock</text>
    <text x="154" y="364" fill="#94a3b8">generated provenance</text>

    <rect x="452" y="316" width="176" height="64" rx="18" fill="#0f172a" stroke="#ffd166" stroke-opacity="0.55"/>
    <text x="474" y="342" fill="#ffd166">make check</text>
    <text x="474" y="364" fill="#94a3b8">validation gate</text>
  </g>

  <g stroke="url(#ember)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M318 209h94"/>
    <path d="m396 193 20 16-20 16"/>
    <path d="M221 254v40"/>
    <path d="m205 278 16 20 16-20"/>
    <path d="M318 347h94"/>
    <path d="m396 331 20 16-20 16"/>
  </g>

  <g transform="translate(312 222)" filter="url(#glow)">
    <path d="M28 76h80l15 22H13l15-22Z" fill="#e5e7eb"/>
    <path d="M42 34h52c12 0 21 9 21 21v8H21v-8c0-12 9-21 21-21Z" fill="#94a3b8"/>
    <path d="M54 4h28l9 30H45l9-30Z" fill="#cbd5e1"/>
    <path d="M2 104h132" stroke="#ff7a1a" stroke-width="8" stroke-linecap="round"/>
    <text x="67" y="137" text-anchor="middle" fill="#ffd166" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="800">agent-ready scaffold</text>
  </g>
</svg>
