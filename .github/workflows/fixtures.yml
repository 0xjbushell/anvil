name: fixtures

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun fixtures
      - run: bun mutation
