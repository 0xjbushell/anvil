name: release-validation

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: scripts/nix-run.sh release -- bun install --frozen-lockfile

      - name: Verify clean checkout
        run: git diff --exit-code && test -z "$(git status --porcelain)"

      - name: Require release tools
        run: scripts/nix-run.sh release -- scripts/require-tools.sh release

      - name: Assert no required-tool skips
        run: scripts/nix-run.sh release -- scripts/require-tools.sh release -- bun test tests/no-required-tool-skips.test.ts

      - name: Agent check
        run: scripts/nix-run.sh release -- scripts/require-tools.sh release -- bun agent:check

      - name: Release tix hygiene
        run: scripts/nix-run.sh release -- scripts/require-tools.sh release -- bun release:hygiene

      - name: Fixtures
        run: scripts/nix-run.sh release -- scripts/require-tools.sh release -- bun fixtures

      - name: Typecheck
        run: scripts/nix-run.sh release -- scripts/require-tools.sh release -- bunx tsc --noEmit

      - name: Full test suite
        run: scripts/nix-run.sh release -- scripts/require-tools.sh release -- bun test

      - name: Supported-language e2e and parity
        run: scripts/nix-run.sh release -- scripts/require-tools.sh release -- bun test tests/e2e/typescript.test.ts tests/e2e/golang.test.ts tests/e2e/python.test.ts tests/parity/anti-slop-parity.test.ts tests/parity/structural-parity.test.ts tests/parity/test-quality-parity.test.ts

      - name: Build binaries
        run: |
          scripts/nix-run.sh release -- scripts/require-tools.sh release
          bun run build

      - name: Verify release assets
        run: |
          test -s "dist/anvil-linux-x64"
          test -s "dist/anvil-linux-arm64"
          test -s "dist/anvil-darwin-x64"
          test -s "dist/anvil-darwin-arm64"
          test -s "dist/anvil-windows-x64.exe"

          for asset in dist/anvil-linux-x64 dist/anvil-linux-arm64; do
            if grep -a -q "/nix/store" "$asset"; then
              echo "$asset references /nix/store; rebuild release assets with portable Bun before publishing." >&2
              exit 1
            fi
          done

          chmod +x dist/anvil-linux-x64
          dist/anvil-linux-x64 --version

          smoke_root="$(mktemp -d)"
          trap 'rm -rf "$smoke_root"' EXIT
          cp dist/anvil-linux-x64 "$smoke_root/anvil"
          chmod +x "$smoke_root/anvil"
          for lang in typescript golang python; do
            project="$smoke_root/$lang-project"
            mkdir -p "$project"
            (cd "$project" && "$smoke_root/anvil" init --lang "$lang" --non-interactive)
            test -f "$project/.anvil.lock"
          done

      - name: Mutation
        run: scripts/nix-run.sh release -- scripts/require-tools.sh release -- bun mutation

      - name: Upload release validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-artifacts
          path: |
            dist/
            .sandbox/
          if-no-files-found: ignore
          retention-days: 14
