name: hostile
description: Setup-backed TypeScript scaffold scenario for read-only files and stale lock payloads.
input: hostile
language: typescript
args:
  - init
  - --lang
  - typescript
  - --non-interactive
expect:
  exit_code: 0
  files_exist:
    - setup-applied.txt
    - readonly.txt
    - package.json
    - src/seed/seed.ts
    - .anvil.lock
  files_absent:
    - .anvil.lock.pid
  files_contain:
    - file: setup-applied.txt
      matches: hostile setup applied
    - file: readonly.txt
      matches: intentionally unwritable text
    - file: package.json
      matches: '"type": "module"'
  stdout_contains:
    - Scaffolded typescript project
  files_unchanged_from_input: false
