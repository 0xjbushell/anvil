name: hostile
description: Setup-backed smoke scenario for the hostile input.
input: hostile
args:
  - --version
expect:
  exit_code: 0
  files_exist:
    - .anvil.lock.pid
    - setup-applied.txt
    - readonly.txt
  files_contain:
    - file: .anvil.lock.pid
      matches: "999999"
    - file: setup-applied.txt
      matches: hostile setup applied
    - file: readonly.txt
      matches: intentionally unwritable text
  stdout_contains:
    - 0.1.0
  stderr_empty: true
  files_unchanged_from_input: false
