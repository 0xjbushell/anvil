name: dirty-git-repo
description: Setup-backed smoke scenario for the dirty git repository input.
input: dirty-git-repo
args:
  - --version
expect:
  exit_code: 0
  files_exist:
    - .git
    - README.md
  files_match_regex:
    - file: README.md
      pattern: uncommitted readme content [0-9]+
  stdout_contains:
    - 0.1.0
  stderr_empty: true
  files_unchanged_from_input: false
