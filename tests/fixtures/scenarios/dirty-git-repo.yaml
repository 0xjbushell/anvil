name: dirty-git-repo
description: Setup-backed TypeScript scaffold conflict scenario for a dirty git repository input.
input: dirty-git-repo
language: typescript
args:
  - init
  - --lang
  - typescript
  - --non-interactive
expect:
  exit_code: 1
  files_exist:
    - .git
    - README.md
  files_match_regex:
    - file: README.md
      pattern: uncommitted readme content [0-9]+
  stderr_contains:
    - --- existing README.md
    - +++ new README.md
    - 1 file differs from current anvil templates.
  files_unchanged_after_setup: true
