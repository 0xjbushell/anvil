name: re-scaffold-drift
description: Setup-backed re-scaffold scenario proving drift reports conflicts and writes nothing.
input: re-scaffold-drift
language: typescript
args:
  - init
  - --lang
  - typescript
  - --non-interactive
expect:
  exit_code: 1
  stderr_contains:
    - --- existing Makefile
    - +++ new Makefile
    - 1 file differs from current anvil templates.
  files_contain:
    - file: Makefile
      matches: locally added by user
  files_unchanged_after_setup: true
