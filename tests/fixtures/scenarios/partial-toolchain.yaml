name: partial-toolchain
description: Real TypeScript scaffold conflict scenario for a partial package input.
input: partial-toolchain
language: typescript
args:
  - init
  - --lang
  - typescript
  - --non-interactive
expect:
  exit_code: 1
  stderr_contains:
    - --- existing package.json
    - +++ new package.json
    - 1 file differs from current anvil templates.
  files_contain:
    - file: package.json
      matches: partial-toolchain-fixture
  files_unchanged_from_input: true
