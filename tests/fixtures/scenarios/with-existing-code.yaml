name: with-existing-code
description: Real TypeScript scaffold scenario preserving existing user source.
input: with-existing-code
language: typescript
args:
  - init
  - --lang
  - typescript
  - --non-interactive
expect:
  exit_code: 0
  files_exist:
    - package.json
    - Makefile
    - src/foo.ts
    - .anvil.lock
  files_absent:
    - src/seed/seed.ts
  files_contain:
    - file: src/foo.ts
      matches: hello, ${name}
    - file: package.json
      matches: '"type": "module"'
  stdout_contains:
    - Scaffolded typescript project
    - "Files skipped:"
  files_unchanged_from_input: false
