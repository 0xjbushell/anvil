name: greenfield-python
description: Real non-interactive Python greenfield scaffold scenario.
input: greenfield
language: python
args:
  - init
  - --lang
  - python
  - --non-interactive
expect:
  exit_code: 0
  files_exist:
    - pyproject.toml
    - Makefile
    - src/seed/seed.py
    - tests/test_seed.py
    - tools/flake8-plugin/setup.py
    - .anvil.lock
  files_contain:
    - file: src/seed/seed.py
      matches: SeedError
    - file: pyproject.toml
      matches: name = "anvil-fixtures-
  stdout_contains:
    - Scaffolded python project
    - "Files created:"
    - Seed code created at src/seed/
  files_unchanged_from_input: false
