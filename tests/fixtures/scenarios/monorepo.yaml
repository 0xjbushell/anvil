name: monorepo
description: Real TypeScript scaffold conflict scenario for a package-workspace input.
input: monorepo
language: typescript
args:
  - init
  - --lang
  - typescript
  - --non-interactive
expect:
  exit_code: 1
  stderr_contains:
    - --- existing package.json
    - +++ new package.json
    - 1 file differs from current anvil templates.
  files_contain:
    - file: package.json
      matches: '"workspaces": ["packages/*"]'
  files_unchanged_from_input: true
